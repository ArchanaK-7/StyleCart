<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | StyleCart</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f5f5;
            padding:40px;
        }

        .register-container{
            width:450px;
            background:white;
            padding:50px;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .register-container h1{
            text-align:center;
            margin-bottom:10px;
            font-size:36px;
        }

        .register-container p{
            text-align:center;
            color:#777;
            margin-bottom:35px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:12px;
            font-size:15px;
        }

        .register-btn{
            width:100%;
            padding:15px;
            border:none;
            background:black;
            color:white;
            border-radius:12px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .register-btn:hover{
            background:#333;
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
            color:#777;
        }

        .bottom-text a{
            color:black;
            text-decoration:none;
            font-weight:500;
        }

    </style>

</head>

<body>

    <div class="register-container">

        <h1>Create Account</h1>

        <p>Join StyleCart today</p>

        <form method="POST">

    {% csrf_token %}

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="username" placeholder="Enter username">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create password">
            </div>


            <button class="register-btn">Register</button>

        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="/login">Login</a>
        </div>

    </div>

</body>
</html>
